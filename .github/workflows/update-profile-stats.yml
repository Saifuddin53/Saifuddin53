name: Update profile stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-profile-stats.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate profile summary
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          AUTO_PUSH: false
          THEME: tokyonight

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true
          path: assets/github-streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/tokyonight/0-profile-details.svg assets/github-streak.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update profile stats"
          git push
