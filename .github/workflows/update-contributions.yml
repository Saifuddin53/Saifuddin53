name: Refresh contribution graph

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-contribution-graph
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render contribution graph
        run: python scripts/generate_contributions.py

      - name: Publish updated graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-graph.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore(profile): refresh contribution graph [skip ci]"
          git push
